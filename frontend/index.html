<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Damm Smart Truck · Interhack BCN 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #E30613;
      --red-dark: #a80009;
      --gold:     #F5A623;
      --gold-dim: rgba(245,166,35,0.18);
      --bg:       #0d0d1a;
      --surface:  #14142a;
      --surface2: #1a1a38;
      --glass:    rgba(255,255,255,0.04);
      --border:   rgba(255,255,255,0.09);
      --text:     #f0f0f5;
      --muted:    #8080a8;
      --font:     'Inter', system-ui, sans-serif;
      --radius:   14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────────────── */
    .site-header {
      background: linear-gradient(135deg, #c40010 0%, #8b0009 60%, #5a0006 100%);
      padding: 32px 40px 36px;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px);
      pointer-events: none;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .logo-badge {
      background: white;
      border-radius: 10px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .logo-damm {
      font-size: 22px;
      font-weight: 900;
      color: var(--red);
      letter-spacing: 2px;
    }
    .logo-star {
      font-size: 20px;
      color: var(--gold);
    }
    .header-text h1 {
      font-size: 28px;
      font-weight: 700;
      color: white;
      line-height: 1.1;
    }
    .header-text p {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
      font-weight: 400;
    }
    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── MAIN CONTENT ───────────────────────────────────────────── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* ── SECTION HEADER ─────────────────────────────────────────── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── ZONE GRID ──────────────────────────────────────────────── */
    #zone-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }
    .zone-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px 14px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.18s, background 0.18s, transform 0.18s, box-shadow 0.18s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .zone-card:hover {
      border-color: rgba(227,6,19,0.5);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(227,6,19,0.15);
    }
    .zone-card.selected {
      border-color: var(--gold);
      background: var(--gold-dim);
      box-shadow: 0 0 0 1px var(--gold), 0 6px 24px rgba(245,166,35,0.25);
    }
    .zone-icon {
      font-size: 22px;
      line-height: 1;
    }
    .zone-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .zone-id-label {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
    }

    /* ── CONTROLS ───────────────────────────────────────────────── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 18px;
    }
    .slider-label {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    .slider-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
      min-width: 26px;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--gold);
      cursor: pointer;
    }

    #simulate-btn {
      flex: 1;
      min-width: 200px;
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    #simulate-btn:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 8px 28px rgba(227,6,19,0.45);
    }
    #simulate-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── SPINNER ────────────────────────────────────────────────── */
    .spinner-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 0;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .solving-text {
      font-size: 15px;
      color: var(--muted);
      font-weight: 500;
    }
    .solving-text span {
      color: var(--text);
    }

    /* ── RESULTS ────────────────────────────────────────────────── */
    #results {
      animation: fadeInUp 0.45s ease both;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    /* ── METRICS STRIP ──────────────────────────────────────────── */
    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .metric-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
      text-align: center;
    }
    .metric-value {
      font-size: 26px;
      font-weight: 800;
      color: var(--gold);
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .metric-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── PRODUCTS STRIP ─────────────────────────────────────────── */
    .products-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 32px;
    }
    .product-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .product-pill .pill-name {
      font-size: 13px;
      font-weight: 600;
    }
    .product-pill .pill-count {
      font-size: 12px;
      color: var(--gold);
      font-weight: 700;
    }
    .product-pill .pill-sku {
      font-size: 10px;
      color: var(--muted);
      font-family: monospace;
    }

    /* ── ROUTE CARDS ────────────────────────────────────────────── */
    .route-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .route-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: var(--glass);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .truck-icon {
      font-size: 24px;
      flex-shrink: 0;
    }
    .route-title {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }
    .badge {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      white-space: nowrap;
    }
    .badge.highlight {
      border-color: rgba(245,166,35,0.4);
      color: var(--gold);
    }

    /* ── STOPS ──────────────────────────────────────────────────── */
    .stops-list {
      padding: 12px 0;
    }
    .stop-item {
      opacity: 0;
      transform: translateX(-14px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }
    .stop-item:last-child { border-bottom: none; }
    .stop-item.revealed {
      opacity: 1;
      transform: translateX(0);
    }
    .stop-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--red);
      color: white;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .stop-body {
      flex: 1;
    }
    .stop-time {
      font-size: 12px;
      font-weight: 700;
      color: var(--gold);
      font-family: monospace;
      margin-bottom: 6px;
      display: block;
    }
    .clients-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .client-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    .client-name {
      font-size: 13px;
      font-weight: 600;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .chip {
      background: rgba(227,6,19,0.1);
      border: 1px solid rgba(227,6,19,0.25);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 11px;
      color: rgba(255,180,180,0.9);
      white-space: nowrap;
    }
    .chip.barrel {
      background: rgba(245,166,35,0.1);
      border-color: rgba(245,166,35,0.3);
      color: rgba(255,220,140,0.9);
    }

    /* ── UTILS ──────────────────────────────────────────────────── */
    [hidden] { display: none !important; }

    @media (max-width: 600px) {
      .site-header { padding: 24px 20px 28px; }
      .header-badge { display: none; }
      .main { padding: 24px 16px 40px; }
      .controls-row { flex-direction: column; align-items: stretch; }
      #simulate-btn { min-width: unset; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo-badge">
      <span class="logo-damm">DAMM</span>
      <span class="logo-star">★</span>
    </div>
    <div class="header-text">
      <h1>Smart Truck</h1>
      <p>AI-powered delivery route optimization &mdash; Granollers</p>
    </div>
    <div class="header-badge">Interhack BCN 2026</div>
  </div>
</header>

<div class="main">

  <!-- ZONE SELECTION -->
  <p class="section-title">1 &mdash; Select a Delivery Zone</p>
  <div id="zone-grid">
    <div style="color:var(--muted);font-size:14px;padding:20px 0;">Loading zones&hellip;</div>
  </div>

  <!-- CONTROLS -->
  <p class="section-title">2 &mdash; Configure &amp; Run</p>
  <div class="controls-row">
    <div class="slider-wrap">
      <span class="slider-label">Boxes per pallet</span>
      <input type="range" id="cajas-slider" min="20" max="120" value="60" step="5">
      <span class="slider-value" id="cajas-value">60</span>
    </div>
    <button id="simulate-btn" disabled>&#9654;&#xFE0E; &nbsp;Run Simulation</button>
  </div>

  <div class="spinner-wrap" hidden id="spinner">
    <div class="spinner"></div>
    <p class="solving-text" id="solving-msg"><span>Solving routes&hellip;</span></p>
  </div>

  <!-- RESULTS -->
  <div id="results" hidden>
    <div class="divider"></div>
    <p class="section-title">3 &mdash; Results</p>

    <div class="metrics-strip" id="metrics-strip"></div>

    <div class="products-strip" id="products-strip"></div>

    <p class="section-title">Routes</p>
    <div id="routes-container"></div>
  </div>

</div>

<script>
  const API = '';

  const ZONE_NAMES = {
    'granollers-center-01': ['Granollers Centre', '01', '🏙'],
    'granollers-center-02': ['Granollers Centre', '02', '🏙'],
    'granollers-center-03': ['Granollers Centre', '03', '🏙'],
    'granollers-center-04': ['Granollers Centre', '04', '🏙'],
    'granollers-center-05': ['Granollers Centre', '05', '🏙'],
    'granollers-center-06': ['Granollers Centre', '06', '🏙'],
    'granollers-center-07': ['Granollers Centre', '07', '🏙'],
    'granollers-center-08': ['Granollers Centre', '08', '🏙'],
    'zona-combinada-01':    ['Zona Combinada',    '01', '🔀'],
    'zona-combinada-02':    ['Zona Combinada',    '02', '🔀'],
  };

  const TRUCK_ICONS = { furgoneta: '🚐', mediano: '🚛', grande: '🚚' };

  const SOLVING_MSGS = [
    'Solving routes…',
    'Optimizing pallets…',
    'Assigning trucks…',
    'Calculating costs…',
    'Finalizing delivery plan…',
  ];

  let selectedZone = null;
  let msgInterval  = null;

  // ── Init ──────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    fetchZones();

    const slider = document.getElementById('cajas-slider');
    const sliderVal = document.getElementById('cajas-value');
    slider.addEventListener('input', () => { sliderVal.textContent = slider.value; });

    document.getElementById('simulate-btn').addEventListener('click', runSimulation);
  });

  // ── Fetch & render zone buttons ───────────────────────────────────
  async function fetchZones() {
    try {
      const data = await fetch(`${API}/api/zona/list`).then(r => r.json());
      renderZoneGrid(data.zonas);
    } catch (e) {
      document.getElementById('zone-grid').innerHTML =
        `<p style="color:var(--red);font-size:14px;">Could not load zones. Is the server running?</p>`;
    }
  }

  function renderZoneGrid(zonas) {
    const grid = document.getElementById('zone-grid');
    grid.innerHTML = zonas.map(id => {
      const [name, num, icon] = ZONE_NAMES[id] ?? [id, '', '📍'];
      return `
        <button class="zone-card" data-id="${id}">
          <span class="zone-icon">${icon}</span>
          <span class="zone-name">${name}<br><strong>Zone ${num}</strong></span>
          <span class="zone-id-label">${id}</span>
        </button>`;
    }).join('');
    grid.querySelectorAll('.zone-card').forEach(btn => {
      btn.addEventListener('click', () => selectZone(btn.dataset.id));
    });
  }

  function selectZone(id) {
    selectedZone = id;
    document.querySelectorAll('.zone-card').forEach(c => c.classList.remove('selected'));
    document.querySelector(`.zone-card[data-id="${id}"]`).classList.add('selected');
    document.getElementById('simulate-btn').disabled = false;
  }

  // ── Run simulation ────────────────────────────────────────────────
  async function runSimulation() {
    if (!selectedZone) return;

    const btn     = document.getElementById('simulate-btn');
    const spinner = document.getElementById('spinner');
    const results = document.getElementById('results');

    btn.disabled = true;
    results.hidden = true;
    spinner.hidden = false;

    // Cycle solving messages
    let msgIdx = 0;
    const msgEl = document.getElementById('solving-msg');
    msgEl.innerHTML = `<span>${SOLVING_MSGS[0]}</span>`;
    msgInterval = setInterval(() => {
      msgIdx = (msgIdx + 1) % SOLVING_MSGS.length;
      msgEl.innerHTML = `<span>${SOLVING_MSGS[msgIdx]}</span>`;
    }, 950);

    try {
      const cajas = parseInt(document.getElementById('cajas-slider').value, 10);
      const data = await fetch(`${API}/api/solve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ zona_id: selectedZone, cajas_por_palet: cajas }),
      }).then(r => {
        if (!r.ok) throw new Error(`Server error ${r.status}`);
        return r.json();
      });

      clearInterval(msgInterval);
      spinner.hidden = true;
      btn.disabled = false;

      renderResults(data);
    } catch (err) {
      clearInterval(msgInterval);
      spinner.hidden = true;
      btn.disabled = false;
      msgEl.innerHTML = `<span style="color:var(--red)">Error: ${err.message}</span>`;
      spinner.hidden = false;
      setTimeout(() => { spinner.hidden = true; }, 4000);
    }
  }

  // ── Render results ────────────────────────────────────────────────
  function renderResults(data) {
    renderMetrics(data.metrics);
    renderProducts(data.metrics.por_sku);
    renderRoutes(data.routes);

    const results = document.getElementById('results');
    results.hidden = false;
    setTimeout(() => results.scrollIntoView({ behavior: 'smooth', block: 'start' }), 60);
  }

  function renderMetrics(m) {
    const trucksStr = Object.entries(m.trucks || {})
      .map(([t, n]) => `${TRUCK_ICONS[t] ?? '🚛'}×${n}`)
      .join('  ') || '—';

    const cards = [
      { value: m.num_rutas,               label: 'Routes' },
      { value: trucksStr,                  label: 'Trucks' },
      { value: m.total_palets,             label: 'Pallets' },
      { value: `€${m.coste_total.toFixed(2)}`, label: 'Est. Cost' },
      { value: m.total_cajas_entregadas,   label: 'Boxes Delivered' },
    ];

    document.getElementById('metrics-strip').innerHTML = cards.map(c => `
      <div class="metric-card">
        <div class="metric-value">${c.value}</div>
        <div class="metric-label">${c.label}</div>
      </div>`).join('');
  }

  function renderProducts(porSku) {
    if (!porSku) return;
    const strip = document.getElementById('products-strip');
    strip.innerHTML = Object.entries(porSku).map(([sku, info]) => `
      <div class="product-pill">
        <span class="pill-sku">${sku}</span>
        <span class="pill-name">${info.nombre ?? sku}</span>
        <span class="pill-count">${info.cajas} boxes</span>
      </div>`).join('');
  }

  function renderRoutes(routes) {
    const container = document.getElementById('routes-container');
    container.innerHTML = routes.map((r, i) => buildRouteCard(r, i)).join('');
    animateStops(container.querySelectorAll('.route-card'));
  }

  function buildRouteCard(routeObj, index) {
    const r = routeObj.route;
    const icon = TRUCK_ICONS[r.tipo_camion] ?? '🚛';
    const truckName = { furgoneta: 'Furgoneta (Van)', mediano: 'Camión Mediano', grande: 'Camión Grande' }[r.tipo_camion] ?? r.tipo_camion;

    const stopsHtml = (r.paradas ?? []).map((p, si) => {
      const timeStr = p.llegada_min != null ? fmtTime(p.llegada_min) : '--:--';
      const clientsHtml = (p.clientes ?? []).map(c => {
        const chips = (c.productos ?? []).map(pr => {
          const cls = pr.tipo_envase === 'barril' ? 'chip barrel' : 'chip';
          return `<span class="${cls}">${pr.nombre.split(' ').slice(0,2).join(' ')} ×${pr.cantidad_cajas}</span>`;
        }).join('');
        return `<li class="client-row">
          <span class="client-name">${c.nombre}</span>
          <div class="chips">${chips}</div>
        </li>`;
      }).join('');
      return `
        <div class="stop-item">
          <span class="stop-num">${si + 1}</span>
          <div class="stop-body">
            <span class="stop-time">&#128336; ${timeStr}</span>
            <ul class="clients-list">${clientsHtml}</ul>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="route-card">
        <div class="route-header">
          <span class="truck-icon">${icon}</span>
          <span class="route-title">Route ${index} &mdash; ${truckName}</span>
          <span class="badge highlight">${r.num_palets} pallet${r.num_palets !== 1 ? 's' : ''}</span>
          <span class="badge">${(r.paradas ?? []).length} stops</span>
        </div>
        <div class="stops-list">${stopsHtml}</div>
      </div>`;
  }

  function animateStops(routeCards) {
    routeCards.forEach((card, ri) => {
      card.querySelectorAll('.stop-item').forEach((stop, si) => {
        setTimeout(() => stop.classList.add('revealed'), ri * 350 + si * 600);
      });
    });
  }

  function fmtTime(minutes) {
    const h = Math.floor(minutes / 60).toString().padStart(2, '0');
    const m = (minutes % 60).toString().padStart(2, '0');
    return `${h}:${m}`;
  }
</script>
</body>
</html>
